<ion-content class="login-page" [fullscreen]="true">
  <div class="status-space"></div>

  <main class="login-wrapper">
    <!-- LOGO -->
    <section class="brand-section">
      <img src="assets/images/logo-occre.png" alt="Logo OCCRE" class="brand-logo" />

      <h1>Bienvenido</h1>
      <p>Inicia sesión para continuar</p>
    </section>

    <!-- FORMULARIO LOGIN -->
    <section class="login-form">
      <ion-item lines="none" class="input-card">
        <ion-icon name="person-outline" slot="start"></ion-icon>

        <ion-input
          type="text"
          inputmode="email"
          autocomplete="email"
          placeholder="Correo electrónico"
          [value]="email"
          (ionInput)="onEmailInput($event)"
        ></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-card">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>

        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          autocomplete="current-password"
          placeholder="Contraseña"
          [value]="password"
          (ionInput)="onPasswordInput($event)"
        ></ion-input>

        <ion-button fill="clear" slot="end" class="eye-btn" (click)="togglePasswordVisibility()">
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>

      <div class="forgot-row">
        <button type="button" [disabled]="isRecoveringPassword" (click)="recoverPassword()">
          <span *ngIf="!isRecoveringPassword">¿Olvidaste tu contraseña?</span>
          <span *ngIf="isRecoveringPassword">Cargando...</span>
        </button>
      </div>

      <ion-button
        expand="block"
        class="login-btn"
        [disabled]="!isFormValid || isSubmitting"
        (click)="login()"
      >
        <ion-spinner *ngIf="isSubmitting" name="crescent"></ion-spinner>
        <span *ngIf="!isSubmitting">Iniciar sesión</span>
      </ion-button>
    </section>

    <!-- ERROR -->
    <p class="form-error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <!-- BIOMÉTRICO -->
    <div class="biometric-section" *ngIf="biometricAvailable">
      <div class="divider">
        <span></span>
        <p>o</p>
        <span></span>
      </div>

      <ion-button
        expand="block"
        fill="outline"
        class="biometric-btn"
        (click)="biometricLogin()"
      >
        <ion-icon name="finger-print-outline" slot="start"></ion-icon>
        Ingresar con {{ biometryLabel }}
      </ion-button>
    </div>

    <!-- DIVISOR -->
    <div class="divider">
      <span></span>
      <p>o también puedes</p>
      <span></span>
    </div>

    <!-- CREAR CUENTA -->
    <ion-button
      expand="block"
      fill="outline"
      class="register-btn"
      [disabled]="isGoingToRegister"
      (click)="goToRegister()"
    >
      <ion-icon name="person-add-outline" slot="start"></ion-icon>
      <span *ngIf="!isGoingToRegister">Crear una cuenta</span>
      <span *ngIf="isGoingToRegister">Cargando...</span>
    </ion-button>

    <!-- TARJETA VISITANTE -->
    <section class="visitor-card">
      <div class="visitor-info">
        <span>¿Vienes de visita?</span>

        <p>Paga tu tarjeta digital de turismo</p>

        <ion-button expand="block" class="visitor-access-btn" (click)="goToTourismCard()">
          Acceder como visitante
        </ion-button>
      </div>
    </section>

    <!-- AYUDA -->
    <section class="help-section">
      <ion-icon name="headset-outline"></ion-icon>

      <div>
        <h3>¿Necesitas ayuda?</h3>
        <p>Contáctanos 24/7</p>
      </div>
    </section>

    <img src="assets/images/login_screen.png" alt="" class="bottom-decoration" />
  </main>
</ion-content>

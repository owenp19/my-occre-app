<ion-content [fullscreen]="true" class="recover-page">
  <main class="recover-screen">
    <header class="recover-header" *ngIf="step === 'form'">
      <button
        type="button"
        class="recover-back-btn"
        aria-label="Volver atrás"
        (click)="goBack()"
      >
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      <div class="recover-header-icon">
        <ion-icon name="lock-closed-outline"></ion-icon>
      </div>

      <h1 class="recover-title">Recuperar contraseña</h1>
      <p class="recover-subtitle">
        Ingresa tu correo electrónico y te enviaremos las instrucciones para
        restablecer tu contraseña.
      </p>
    </header>

    <header class="recover-header" *ngIf="step === 'sent'">
      <button
        type="button"
        class="recover-back-btn"
        aria-label="Volver atrás"
        (click)="goBack()"
      >
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>

      <div class="recover-header-icon sent">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
      </div>

      <h1 class="recover-title">Correo enviado</h1>
      <p class="recover-subtitle">
        Si el correo ingresado está registrado, recibirás las instrucciones
        para restablecer tu contraseña en unos minutos.
      </p>
    </header>

    <section class="recover-body" aria-label="Formulario de recuperación">
      <form
        class="recover-form"
        *ngIf="step === 'form'"
        (ngSubmit)="sendRecovery()"
      >
        <div class="field-group">
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>

            <ion-input
              id="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="Correo electrónico"
              [value]="email"
              (ionInput)="onEmailInput($event)"
            ></ion-input>
          </div>
        </div>

        <button
          type="submit"
          class="recover-button occre-btn occre-btn--primary occre-btn--full"
          [disabled]="!isEmailValid || isSubmitting"
          [class.is-loading]="isSubmitting"
        >
          <span *ngIf="!isSubmitting">Enviar instrucciones</span>
          <span *ngIf="isSubmitting">Enviando...</span>
        </button>
      </form>

      <div class="recover-sent" *ngIf="step === 'sent'">
        <button
          type="button"
          class="recover-button occre-btn occre-btn--primary occre-btn--full"
          (click)="goToLogin()"
        >
          Volver al inicio de sesión
        </button>

        <button
          type="button"
          class="recover-resend occre-btn occre-btn--link"
          (click)="goBack()"
        >
          Intentar con otro correo
        </button>
      </div>
    </section>
  </main>
</ion-content>

<ion-menu
  menuId="home-menu"
  contentId="home-main-content"
  side="start"
  type="overlay"
  class="home-menu"
>
  <ion-content class="menu-content">
    <aside class="side-menu">
      <div class="menu-header">
        <img
          class="menu-brand"
          [src]="brandImagePath"
          alt="Logo OCCRE"
        />

        <button
          type="button"
          class="menu-close-button"
          aria-label="Cerrar menú"
          (click)="closeMenu()"
        >
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <nav class="menu-nav" aria-label="Menú principal">
        <button
          type="button"
          class="menu-nav-item"
          *ngFor="let option of menuOptions"
          (click)="goTo(option.route)"
        >
          <ion-icon [name]="option.icon"></ion-icon>

          <span>{{ option.label }}</span>

          <ion-icon name="chevron-forward-outline"></ion-icon>
        </button>
      </nav>
    </aside>
  </ion-content>
</ion-menu>

<ion-content
  id="home-main-content"
  [fullscreen]="true"
  class="home-content"
>
  <main class="home-page">
    <section class="hero-section">
      <header class="home-header">
        <ion-button
          fill="clear"
          class="menu-button"
          aria-label="Abrir menú"
          (click)="openMenu()"
        >
          <ion-icon name="menu-outline"></ion-icon>
        </ion-button>

        <div class="header-spacer" aria-hidden="true"></div>

        <div class="header-actions">
          <button
            type="button"
            class="notification-button"
            aria-label="Ver notificaciones"
            (click)="openNotifications()"
          >
            <ion-icon name="notifications-outline"></ion-icon>

            <span
              class="notification-badge"
              *ngIf="notificationCount > 0"
            >
              {{ notificationCount }}
            </span>
          </button>

          <button
            type="button"
            class="profile-button"
            aria-label="Abrir perfil"
            (click)="openProfile()"
          >
            <ng-container *ngIf="!profileImageUrl; else profilePhoto">
              {{ userInitials }}
            </ng-container>

            <ng-template #profilePhoto>
              <img
                class="profile-image"
                [src]="profileImageUrl"
                alt="Foto de perfil"
              />
            </ng-template>
          </button>

          <button
            type="button"
            class="profile-options"
            aria-label="Opciones de perfil"
            (click)="openProfile()"
          >
            <ion-icon name="chevron-down-outline"></ion-icon>
          </button>
        </div>
      </header>

      <article class="hero-card">
        <ng-container *ngFor="let slide of heroSlides; let index = index">
          <img
            class="hero-image"
            [class.active]="index === activeSlideIndex"
            [src]="slide.image"
            [alt]="slide.title"
          />
        </ng-container>

        <div class="hero-overlay"></div>

        <div class="hero-copy">
          <p class="hero-kicker">
            {{ activeSlide.kicker }}
          </p>

          <h2>
            {{ activeSlide.title }}
          </h2>

          <p class="hero-description">
            {{ activeSlide.description }}
          </p>

          <ion-button
            class="explore-button"
            type="button"
            (click)="goToActiveSlideRoute()"
          >
            {{ activeSlide.actionLabel }}

            <ion-icon
              slot="end"
              name="chevron-forward-outline"
            ></ion-icon>
          </ion-button>
        </div>

        <div class="hero-indicators" aria-label="Indicador del carrusel">
          <button
            type="button"
            *ngFor="let slide of heroSlides; let index = index"
            [class.active]="index === activeSlideIndex"
            [attr.aria-label]="'Ver noticia ' + (index + 1)"
            (click)="selectSlide(index)"
          ></button>
        </div>
      </article>
    </section>

    <section class="search-section">
      <form
        class="search-box"
        role="search"
        (ngSubmit)="submitSearch()"
      >
        <ion-icon name="search-outline"></ion-icon>

        <input
          type="search"
          name="homeSearch"
          [(ngModel)]="searchTerm"
          placeholder="Buscar trámites, requisitos..."
          aria-label="Buscar trámites, requisitos o preguntas frecuentes"
          autocomplete="off"
        />
      </form>

      <button
        type="button"
        class="filter-button"
        aria-label="Abrir opciones rápidas de búsqueda"
        (click)="toggleQuickSearchOptions()"
      >
        <ion-icon name="options-outline"></ion-icon>
      </button>

      <div
        class="quick-search-panel"
        *ngIf="isQuickSearchOpen"
      >
        <button
          type="button"
          class="quick-search-option"
          *ngFor="let option of quickSearchOptions"
          (click)="selectQuickSearch(option)"
        >
          <ion-icon [name]="option.icon"></ion-icon>
          <span>{{ option.label }}</span>
        </button>
      </div>
    </section>

    <section class="home-body">
      <section class="home-section" aria-labelledby="occre-procedures-title">
        <div class="section-header">
          <div>
            <p class="section-kicker">Catálogo de servicios</p>
            <h2 id="occre-procedures-title">Trámites OCCRE</h2>
          </div>

          <button
            type="button"
            class="see-all-button"
            (click)="goTo('/procedures')"
          >
            <span>Ver todos</span>
            <ion-icon name="chevron-forward-outline"></ion-icon>
          </button>
        </div>

        <div class="procedures-list">
          <button
            type="button"
            class="procedure-list-card"
            *ngFor="let procedure of occreProcedures"
            [ngClass]="procedure.colorClass"
            (click)="goToProcedure(procedure)"
          >
            <span class="procedure-list-icon">
              <ion-icon [name]="procedure.icon"></ion-icon>
            </span>

            <span class="procedure-list-content">
              <span class="procedure-list-category">
                {{ procedure.category }}
              </span>

              <span class="procedure-list-title">
                {{ procedure.title }}
              </span>

              <span class="procedure-list-description">
                {{ procedure.description }}
              </span>
            </span>

            <ion-icon
              class="procedure-list-arrow"
              name="chevron-forward-outline"
            ></ion-icon>
          </button>
        </div>
      </section>

      <section class="data-protection-card" aria-label="Protección de datos">
        <div class="data-protection-visual">
          <div class="shield-icon">
            <ion-icon name="shield-checkmark-outline"></ion-icon>
          </div>
        </div>

        <div class="data-protection-copy">
          <h2>Tus datos están protegidos</h2>

          <p>
            Manejamos tu información personal con criterios de seguridad,
            confidencialidad y uso responsable.
          </p>
        </div>

        <button
          type="button"
          class="data-protection-button"
          (click)="goTo('/profile')"
        >
          <span>Conoce más</span>
          <ion-icon name="shield-checkmark-outline"></ion-icon>
        </button>
      </section>

      <div class="bottom-menu-end">
        <app-bottom-menu active="home"></app-bottom-menu>
      </div>
    </section>
  </main>
</ion-content>
